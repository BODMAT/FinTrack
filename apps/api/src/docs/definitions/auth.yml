components:
  schemas:
    AuthLoginInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [email, password]

    AuthGoogleExchangeInput:
      type: object
      properties:
        idToken:
          type: string
      required: [idToken]

    AuthAuthenticatedResponse:
      type: object
      properties:
        authenticated:
          type: boolean
          example: true

    AuthError:
      type: object
      properties:
        error:
          type: string

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginInput'
      responses:
        '200':
          description: Authenticated and cookies set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAuthenticatedResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'

  /auth/google/exchange:
    post:
      tags: [Auth]
      summary: Exchange Google ID token for backend session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthGoogleExchangeInput'
      responses:
        '200':
          description: Authenticated and cookies set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAuthenticatedResponse'
        '400':
          description: Invalid payload

  /auth/token:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a fresh session
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Session rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAuthenticatedResponse'
        '401':
          description: Invalid, expired or reused refresh token

  /auth/logout:
    delete:
      tags: [Auth]
      summary: Logout current refresh session
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '204':
          description: Logged out

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout from all sessions of current user
      responses:
        '204':
          description: All sessions revoked
        '401':
          description: Unauthorized
