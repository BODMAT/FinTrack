components:
  schemas:
    AIRequestInput:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
        data:
          type: object
      required: [prompt, data]

    AIResponse:
      type: object
      properties:
        model:
          type: string
        result:
          type: string

    AIHistoryItem:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        result:
          type: string
        created_at:
          type: string
          format: date-time

    AIAccess:
      type: object
      properties:
        role:
          type: string
          enum: [USER, ADMIN]
        tier:
          type: string
          enum: [user, donor, admin]
        donationStatus:
          type: string
        donationExpiresAt:
          type: [string, 'null']
          format: date-time
        aiAnalysisUsed:
          type: integer
        aiAnalysisLimit:
          type: integer
        remainingAttempts:
          type: [integer, 'null']
        isUnlimited:
          type: boolean

paths:
  /ai:
    post:
      tags: [AI]
      summary: Analyze financial data with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIRequestInput'
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResponse'
        '403':
          description: AI limit reached
        '503':
          description: AI provider unavailable or key-related error

  /ai/history:
    get:
      tags: [AI]
      summary: Get AI prompts/results history for current user
      responses:
        '200':
          description: History list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AIHistoryItem'

  /ai/access:
    get:
      tags: [AI]
      summary: Get current AI access tier and limits
      responses:
        '200':
          description: Access status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIAccess'
