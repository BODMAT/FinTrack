paths:
  /admin/error-logs/report:
    post:
      tags: [Admin]
      summary: Report client/runtime error from authenticated user
      responses:
        "201":
          description: Error report created

  /admin/users:
    get:
      tags: [Admin]
      summary: List users (admin only)
      responses:
        "200":
          description: Users list
          content:
            application/json:
              example:
                - id: "d5adc858-2ffc-4a69-972b-540af8a3b563"
                  name: "Admin User"
                  role: "ADMIN"
                  created_at: "2025-09-01T12:30:00.000Z"

  /admin/users/{userId}/role:
    patch:
      tags: [Admin]
      summary: Update user role (admin only)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User role updated

  /admin/sessions/revoke-user/{userId}:
    post:
      tags: [Admin]
      summary: Revoke active sessions for specific user (admin only)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Revocation result

  /admin/sessions/revoke-all:
    post:
      tags: [Admin]
      summary: Revoke active sessions for all users (admin only)
      responses:
        "200":
          description: Revocation result

  /admin/stats:
    get:
      tags: [Admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Stats payload
          content:
            application/json:
              example:
                totalUsers: 2
                totalTransactions: 86
                totalDonations: 1
                errorLogs:
                  total: 9
                  open: 6
                  resolved: 3

  /admin/error-logs:
    get:
      tags: [Admin]
      summary: List error logs (admin only)
      responses:
        "200":
          description: Error logs list
          content:
            application/json:
              example:
                - id: "ae13c501-b0e9-4a7a-97ff-91c9f177e9cb"
                  message: "Failed to fetch exchange rate"
                  stack: "Error: Network error at..."
                  status: "OPEN"
                  userId: "d5adc858-2ffc-4a69-972b-540af8a3b563"
                  createdAt: "2025-09-15T10:00:00.000Z"

  /admin/error-logs/{errorLogId}/resolve:
    patch:
      tags: [Admin]
      summary: Mark error log resolved/unresolved (admin only)
      parameters:
        - in: path
          name: errorLogId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated error log status
          content:
            application/json:
              example:
                id: "ae13c501-b0e9-4a7a-97ff-91c9f177e9cb"
                status: "RESOLVED"
