name: CI — Lint, Format, Types, Tests

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-env:
    name: Validate ENV Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if .env.example matches .env.docker.example
        run: |
          diff <(grep -v '^#' apps/api/.env.example | cut -d= -f1 | sort) <(grep -v '^#' apps/api/.env.docker.example | cut -d= -f1 | sort) || { echo "::error::API env examples are out of sync!"; exit 1; }
        shell: bash

  migration-check:
    name: Migration Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Check for schema drift
        run: npx prisma migrate diff --from-schema-datamodel
          apps/api/prisma/schema.prisma --to-schema-migrations apps/api/prisma
          --shadow-database-url
          postgresql://postgres:postgres@localhost:5432/shadow_db
        # We don't actually need a running shadow DB for simple diff check in most cases, 
        # but prisma might demand it. If it fails, we will simplify.
        continue-on-error: true

  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/turbo-cache
      - name: Build internal packages
        run: npm run setup:types
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/turbo-cache
      - name: Build internal packages
        run: npm run setup:types
      - name: Type check
        run: npm run check-types

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Audit dependencies
        shell: bash
        run: |
          npm audit --json > audit.json || true
          node - <<'NODE'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync("audit.json", "utf8"));
          const ignoreGhsa = new Set(["GHSA-v2v4-37r5-5v8g"]);

          const vulns = report.vulnerabilities ?? {};
          const failing = [];

          for (const [name, vuln] of Object.entries(vulns)) {
            const severity = vuln?.severity;
            if (!["moderate", "high", "critical"].includes(severity)) continue;

            const via = Array.isArray(vuln?.via) ? vuln.via : [];
            const viaPackages = via
              .filter((v) => typeof v === "string")
              .map((v) => String(v));
            const advisoryUrls = via
              .filter((v) => typeof v === "object" && v?.url)
              .map((v) => String(v.url));

            const hasOnlyIgnoredAdvisories =
              advisoryUrls.length > 0 &&
              advisoryUrls.every((url) =>
                Array.from(ignoreGhsa).some((id) => url.includes(id)),
              );

            const isExpressRateLimitViaIgnoredIpAddress =
              name === "express-rate-limit" && viaPackages.includes("ip-address");

            if (hasOnlyIgnoredAdvisories) continue;
            if (isExpressRateLimitViaIgnoredIpAddress) continue;
            failing.push({ name, severity, via: advisoryUrls });
          }

          if (failing.length > 0) {
            console.error("Blocking vulnerabilities found:");
            for (const item of failing) {
              console.error(`- ${item.name} (${item.severity})`);
              for (const url of item.via) console.error(`  ${url}`);
            }
            process.exit(1);
          }

          console.log("Security audit passed (known GHSA-v2v4-37r5-5v8g ignored until upstream fix).");
          NODE
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fintrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/turbo-cache
      - name: Build internal packages
        run: npm run setup:types
      - name: Generate Prisma client
        run: npm run prisma:api:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fintrack_test
          DIRECT_URL: postgresql://test:test@localhost:5432/fintrack_test
      - name: Run migrations
        run: npm run prisma:api:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fintrack_test
          DIRECT_URL: postgresql://test:test@localhost:5432/fintrack_test
      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fintrack_test
          DIRECT_URL: postgresql://test:test@localhost:5432/fintrack_test
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            apps/api/coverage/
            apps/web/coverage/
          retention-days: 7
          if-no-files-found: ignore
