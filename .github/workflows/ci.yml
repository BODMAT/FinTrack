name: CI — Lint, Format, Types, Tests

on:
  pull_request:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fintrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Generate Prisma client
        run: npm run api:prisma:generate

      - name: Run migrations
        run: npm run api:prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fintrack_test

      - name: Run API tests
        run: npm --prefix apps/api run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/fintrack_test