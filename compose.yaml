services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: "unless-stopped"
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
      POSTGRES_DB: fintrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fintrack -d fintrack" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "unless-stopped"
    env_file:
      # Copy apps/api/.env.docker.example → apps/api/.env.docker and fill in
      # your values before running docker compose up.
      - apps/api/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Telegram bot ───────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: "unless-stopped"
    env_file:
      # Copy apps/bot/.env.example → apps/bot/.env.docker and set BOT_API_KEY
      - apps/bot/.env.docker
    depends_on:
      api:
        condition: service_healthy

  # ── Next.js web ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Nginx forwards /api/* → api:8000, so the browser always calls its
        # own origin (/api/…) and never needs the internal service address.
        NEXT_PUBLIC_API_URL: /api
    restart: "unless-stopped"
    env_file:
      - apps/web/.env.docker
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:5173/FinTrack/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: "unless-stopped"
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1/FinTrack/ || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
