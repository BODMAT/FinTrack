upstream api {
    server api:8000;
}

upstream web {
    server web:5173;
}

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # ── Root redirect ─────────────────────────────────────────────────────────
    # Send bare "/" to the app so users are never left on a blank page.
    location = / {
        return 301 $scheme://$http_host/FinTrack/;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api;

        include /etc/nginx/proxy_headers.conf;

        # Needed for cookie-based auth to work through the proxy
        proxy_pass_header  Set-Cookie;

        # Stripe webhook sends raw bodies up to 512 KB
        client_max_body_size 512k;
    }

    # ── Swagger docs ──────────────────────────────────────────────────────────
    location /api-docs {
        proxy_pass         http://api;

        include /etc/nginx/proxy_headers.conf;
    }

    # ── Next.js web app ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web;

        include /etc/nginx/proxy_headers.conf;

        # Required for Next.js HMR websocket in dev; harmless in prod
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}