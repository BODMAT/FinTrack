upstream api {
    server api:8000;
}

upstream web {
    server web:5173;
}

server {
    listen 80;
    server_name localhost;

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for cookie-based auth to work through the proxy
        proxy_pass_header  Set-Cookie;

        # Stripe webhook sends raw bodies up to 512 KB
        client_max_body_size 512k;
    }

    # ── Swagger docs ──────────────────────────────────────────────────────────
    location /api-docs {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js web app ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;

        # Required for Next.js HMR websocket in dev; harmless in prod
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}